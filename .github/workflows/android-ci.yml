name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log
        EXIT_CODE=${PIPESTATUS[0]}
        if [ $EXIT_CODE -ne 0 ]; then
          echo "BUILD FAILED (exit $EXIT_CODE)"
          grep -E "^e:|error:|Duplicate|MissingBinding|cannot find|Unresolved|Type mismatch" build.log | head -30
          echo "=== WHAT WENT WRONG ==="
          grep -A5 "What went wrong:" build.log | head -20
          echo "=== FAILED TASK ==="
          grep "FAILED" build.log | head -5
          echo "=== LAST 5 LINES ==="
          tail -5 build.log
          exit 1
        fi

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest --no-daemon
      continue-on-error: true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
