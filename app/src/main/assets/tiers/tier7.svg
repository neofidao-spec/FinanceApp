<svg viewBox="0 0 520 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="rays_tier7-master-kebebasan-finansial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8C8F5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E8C8F5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim_tier7-master-kebebasan-finansial" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F0D8FA"/>
      <stop offset="50%" stop-color="#7C6FE0"/>
      <stop offset="100%" stop-color="#4A3E9C"/>
    </linearGradient>
    <linearGradient id="face_tier7-master-kebebasan-finansial" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F5C563"/>
      <stop offset="100%" stop-color="#E85D9C"/>
    </linearGradient>
    <linearGradient id="gem_tier7-master-kebebasan-finansial" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8B8F0"/>
    </linearGradient>
    <linearGradient id="ribbon_tier7-master-kebebasan-finansial" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5A3E9C"/>
      <stop offset="100%" stop-color="#3A2666"/>
    </linearGradient>
    <filter id="shadow_tier7-master-kebebasan-finansial" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1E3A4C" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="520" height="640" fill="#EEF2F4"/>

  <g transform="translate(260,260)" filter="url(#shadow_tier7-master-kebebasan-finansial)">
    <!-- sunburst rays -->
    <path d="M-0.0,50.0 L-17.2,86.3 L-19.1,46.2 L-48.9,73.2 L-35.4,35.4 L-73.2,48.9 L-46.2,19.1 L-86.3,17.2 L-50.0,0.0 L-86.3,-17.2 L-46.2,-19.1 L-73.2,-48.9 L-35.4,-35.4 L-48.9,-73.2 L-19.1,-46.2 L-17.2,-86.3 L-0.0,-50.0 L17.2,-86.3 L19.1,-46.2 L48.9,-73.2 L35.4,-35.4 L73.2,-48.9 L46.2,-19.1 L86.3,-17.2 L50.0,-0.0 L86.3,17.2 L46.2,19.1 L73.2,48.9 L35.4,35.4 L48.9,73.2 L19.1,46.2 L17.2,86.3 Z" fill="url(#rays_tier7-master-kebebasan-finansial)"/>
    
    <polygon points="130,-6 260,60 390,-6 390,20 260,86 130,20" fill="url(#rays_tier7-master-kebebasan-finansial)" opacity="0.35"/>

    <!-- outer rim -->
    <circle r="175" fill="url(#rim_tier7-master-kebebasan-finansial)"/>
    <circle r="158" fill="url(#face_tier7-master-kebebasan-finansial)" stroke="#4A3E9C" stroke-width="2"/>
    <!-- bevel highlight -->
    <circle r="171" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="3"/>
    <!-- inner medallion -->
    <circle r="128" fill="url(#gem_tier7-master-kebebasan-finansial)" stroke="#4A3E9C" stroke-width="3"/>
    <circle r="118" fill="none" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="2"/>

    <!-- icon -->
    <g transform="translate(0,-10) scale(1.6)">
      <polygon points="0.0,-16.0 -3.8,-5.3 -15.2,-4.9 -6.2,2.0 -9.4,12.9 -0.0,6.5 9.4,12.9 6.2,2.0 15.2,-4.9 3.8,-5.3" fill="#E8B8F0"/>
    </g>

    <!-- studs around rim -->
    <circle cx="175.0" cy="0.0" r="6" fill="#F0D8FA" stroke="#4A3E9C" stroke-width="1.5"/><circle cx="123.7" cy="123.7" r="6" fill="#F0D8FA" stroke="#4A3E9C" stroke-width="1.5"/><circle cx="0.0" cy="175.0" r="6" fill="#F0D8FA" stroke="#4A3E9C" stroke-width="1.5"/><circle cx="-123.7" cy="123.7" r="6" fill="#F0D8FA" stroke="#4A3E9C" stroke-width="1.5"/><circle cx="-175.0" cy="0.0" r="6" fill="#F0D8FA" stroke="#4A3E9C" stroke-width="1.5"/><circle cx="-123.7" cy="-123.7" r="6" fill="#F0D8FA" stroke="#4A3E9C" stroke-width="1.5"/><circle cx="-0.0" cy="-175.0" r="6" fill="#F0D8FA" stroke="#4A3E9C" stroke-width="1.5"/><circle cx="123.7" cy="-123.7" r="6" fill="#F0D8FA" stroke="#4A3E9C" stroke-width="1.5"/>
  </g>

  <!-- ribbon banner -->
  <g transform="translate(260,453)">
    <path d="M-190,0 L-150,34 L150,34 L190,0 L150,52 L-150,52 Z" fill="url(#ribbon_tier7-master-kebebasan-finansial)"/>
    <rect x="-150" y="0" width="300" height="52" fill="url(#ribbon_tier7-master-kebebasan-finansial)" rx="4"/>
    <text x="0" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">MASTER KEBEBASAN</text>
    <text x="0" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">FINANSIAL</text>
  </g>
  <text x="260" y="531" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="600" fill="#6B7C87" text-anchor="middle" letter-spacing="1.5">TIER TERTINGGI</text>
</svg>