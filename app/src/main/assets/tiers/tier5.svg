<svg viewBox="0 0 520 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="rays_tier5-ahli-finansial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8FD0F0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8FD0F0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim_tier5-ahli-finansial" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#A8D4F0"/>
      <stop offset="50%" stop-color="#2E7DB8"/>
      <stop offset="100%" stop-color="#1A4A70"/>
    </linearGradient>
    <linearGradient id="face_tier5-ahli-finansial" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#8FD0F0"/>
      <stop offset="100%" stop-color="#2E7DB8"/>
    </linearGradient>
    <linearGradient id="gem_tier5-ahli-finansial" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0E8FA"/>
      <stop offset="100%" stop-color="#3E8FC9"/>
    </linearGradient>
    <linearGradient id="ribbon_tier5-ahli-finansial" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E5A87"/>
      <stop offset="100%" stop-color="#123A58"/>
    </linearGradient>
    <filter id="shadow_tier5-ahli-finansial" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1E3A4C" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="520" height="640" fill="#EEF2F4"/>

  <g transform="translate(260,260)" filter="url(#shadow_tier5-ahli-finansial)">
    <!-- sunburst rays -->
    <path d="M-0.0,50.0 L-17.2,86.3 L-19.1,46.2 L-48.9,73.2 L-35.4,35.4 L-73.2,48.9 L-46.2,19.1 L-86.3,17.2 L-50.0,0.0 L-86.3,-17.2 L-46.2,-19.1 L-73.2,-48.9 L-35.4,-35.4 L-48.9,-73.2 L-19.1,-46.2 L-17.2,-86.3 L-0.0,-50.0 L17.2,-86.3 L19.1,-46.2 L48.9,-73.2 L35.4,-35.4 L73.2,-48.9 L46.2,-19.1 L86.3,-17.2 L50.0,-0.0 L86.3,17.2 L46.2,19.1 L73.2,48.9 L35.4,35.4 L48.9,73.2 L19.1,46.2 L17.2,86.3 Z" fill="url(#rays_tier5-ahli-finansial)"/>
    

    <!-- outer rim -->
    <circle r="175" fill="url(#rim_tier5-ahli-finansial)"/>
    <circle r="158" fill="url(#face_tier5-ahli-finansial)" stroke="#1A4A70" stroke-width="2"/>
    <!-- bevel highlight -->
    <circle r="171" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="3"/>
    <!-- inner medallion -->
    <circle r="128" fill="url(#gem_tier5-ahli-finansial)" stroke="#1A4A70" stroke-width="3"/>
    <circle r="118" fill="none" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="2"/>

    <!-- icon -->
    <g transform="translate(0,-10) scale(1.6)">
      <path d="M0,-15 L15,-2 L0,18 L-15,-2 Z M-15,-2 L15,-2 M-8,-15 L-4,-2 L0,18 M8,-15 L4,-2 L0,18" fill="none" stroke="#3E8FC9" stroke-width="2.2" stroke-linejoin="round"/>
    </g>

    <!-- studs around rim -->
    <circle cx="175.0" cy="0.0" r="6" fill="#A8D4F0" stroke="#1A4A70" stroke-width="1.5"/><circle cx="123.7" cy="123.7" r="6" fill="#A8D4F0" stroke="#1A4A70" stroke-width="1.5"/><circle cx="0.0" cy="175.0" r="6" fill="#A8D4F0" stroke="#1A4A70" stroke-width="1.5"/><circle cx="-123.7" cy="123.7" r="6" fill="#A8D4F0" stroke="#1A4A70" stroke-width="1.5"/><circle cx="-175.0" cy="0.0" r="6" fill="#A8D4F0" stroke="#1A4A70" stroke-width="1.5"/><circle cx="-123.7" cy="-123.7" r="6" fill="#A8D4F0" stroke="#1A4A70" stroke-width="1.5"/><circle cx="-0.0" cy="-175.0" r="6" fill="#A8D4F0" stroke="#1A4A70" stroke-width="1.5"/><circle cx="123.7" cy="-123.7" r="6" fill="#A8D4F0" stroke="#1A4A70" stroke-width="1.5"/>
  </g>

  <!-- ribbon banner -->
  <g transform="translate(260,453)">
    <path d="M-190,0 L-150,34 L150,34 L190,0 L150,52 L-150,52 Z" fill="url(#ribbon_tier5-ahli-finansial)"/>
    <rect x="-150" y="0" width="300" height="52" fill="url(#ribbon_tier5-ahli-finansial)" rx="4"/>
    <text x="0" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">AHLI</text>
    <text x="0" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">FINANSIAL</text>
  </g>
  <text x="260" y="531" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="600" fill="#6B7C87" text-anchor="middle" letter-spacing="1.5">LEVEL 21-25</text>
</svg>